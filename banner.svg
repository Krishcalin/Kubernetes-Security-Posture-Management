<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Main gradient - deep space with K8s blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="30%" style="stop-color:#0d1b3e"/>
      <stop offset="60%" style="stop-color:#132952"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#326ce5;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#326ce5;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9af5"/>
      <stop offset="50%" style="stop-color:#326ce5"/>
      <stop offset="100%" style="stop-color:#1a4bbd"/>
    </linearGradient>
    <!-- K8s wheel gradient -->
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8ddf5"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#326ce5" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <!-- Hex pattern -->
    <pattern id="hexGrid" width="60" height="52" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <polygon points="30,2 55,15 55,37 30,50 5,37 5,15" fill="none" stroke="#326ce5" stroke-width="0.4" opacity="0.08"/>
    </pattern>
    <!-- Scan line animation -->
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="45%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="55%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#hexGrid)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Ambient glow effects -->
  <ellipse cx="250" cy="200" rx="300" ry="250" fill="url(#glowBlue)"/>
  <ellipse cx="900" cy="180" rx="250" ry="200" fill="url(#glowCyan)"/>

  <!-- Decorative circuit lines - left -->
  <g stroke="#326ce5" stroke-width="1" opacity="0.2" fill="none">
    <path d="M 0 80 L 60 80 L 80 100 L 80 160"/>
    <path d="M 0 320 L 40 320 L 60 300 L 120 300"/>
    <path d="M 0 180 L 30 180 L 50 200 L 50 240 L 70 260"/>
    <circle cx="80" cy="160" r="3" fill="#326ce5"/>
    <circle cx="120" cy="300" r="3" fill="#326ce5"/>
    <circle cx="70" cy="260" r="3" fill="#326ce5"/>
  </g>

  <!-- Decorative circuit lines - right -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.15" fill="none">
    <path d="M 1200 100 L 1140 100 L 1120 120 L 1120 180"/>
    <path d="M 1200 280 L 1160 280 L 1140 260 L 1080 260"/>
    <path d="M 1200 200 L 1170 200 L 1150 220 L 1150 260"/>
    <circle cx="1120" cy="180" r="3" fill="#00d4ff"/>
    <circle cx="1080" cy="260" r="3" fill="#00d4ff"/>
  </g>

  <!-- Floating nodes background - left cluster -->
  <g opacity="0.12">
    <rect x="60" y="40" width="28" height="28" rx="4" fill="none" stroke="#4a9af5" stroke-width="1"/>
    <rect x="100" y="55" width="22" height="22" rx="3" fill="none" stroke="#4a9af5" stroke-width="0.8"/>
    <rect x="45" y="85" width="20" height="20" rx="3" fill="none" stroke="#4a9af5" stroke-width="0.8"/>
    <line x1="88" y1="54" x2="100" y2="60" stroke="#4a9af5" stroke-width="0.6"/>
    <line x1="74" y1="68" x2="65" y2="85" stroke="#4a9af5" stroke-width="0.6"/>
  </g>

  <!-- Floating nodes background - right cluster -->
  <g opacity="0.1">
    <rect x="1080" y="50" width="24" height="24" rx="4" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <rect x="1110" y="80" width="20" height="20" rx="3" fill="none" stroke="#00d4ff" stroke-width="0.8"/>
    <rect x="1060" y="90" width="18" height="18" rx="3" fill="none" stroke="#00d4ff" stroke-width="0.8"/>
    <line x1="1092" y1="74" x2="1110" y2="85" stroke="#00d4ff" stroke-width="0.6"/>
    <line x1="1080" y1="62" x2="1069" y2="90" stroke="#00d4ff" stroke-width="0.6"/>
  </g>

  <!-- Bottom data flow lines -->
  <g stroke="#326ce5" stroke-width="0.8" opacity="0.12" fill="none">
    <path d="M 200 370 L 300 370 L 320 355 L 450 355 L 470 370 L 600 370"/>
    <path d="M 600 370 L 700 370 L 720 355 L 850 355 L 870 370 L 1000 370"/>
    <circle cx="320" cy="355" r="2" fill="#326ce5"/>
    <circle cx="470" cy="370" r="2" fill="#326ce5"/>
    <circle cx="720" cy="355" r="2" fill="#326ce5"/>
    <circle cx="870" cy="370" r="2" fill="#326ce5"/>
  </g>

  <!-- ============================================ -->
  <!-- SHIELD + K8S WHEEL ICON (center-left)        -->
  <!-- ============================================ -->
  <g transform="translate(185, 200)" filter="url(#shadow)">
    <!-- Shield body -->
    <path d="M 0 -80 L 65 -55 L 65 20 Q 65 70 0 95 Q -65 70 -65 20 L -65 -55 Z"
          fill="url(#shieldGrad)" opacity="0.95" stroke="#4a9af5" stroke-width="1.5"/>
    <!-- Shield highlight -->
    <path d="M 0 -72 L 55 -50 L 55 -20 L 0 -40 L -55 -20 L -55 -50 Z"
          fill="#ffffff" opacity="0.08"/>

    <!-- Kubernetes wheel inside shield -->
    <g transform="translate(0, 8) scale(0.72)" fill="url(#wheelGrad)" filter="url(#glow)">
      <!-- Center heptagon -->
      <circle cx="0" cy="0" r="14" fill="none" stroke="white" stroke-width="3.5" opacity="0.95"/>
      <circle cx="0" cy="0" r="5" fill="white" opacity="0.9"/>

      <!-- 7 spokes -->
      <g stroke="white" stroke-width="3" opacity="0.9" stroke-linecap="round">
        <line x1="0" y1="-16" x2="0" y2="-44"/>
        <line x1="13.6" y1="-8" x2="37.4" y2="-22"/>
        <line x1="13.6" y1="8" x2="37.4" y2="22"/>
        <line x1="0" y1="16" x2="0" y2="44"/>
        <line x1="-13.6" y1="8" x2="-37.4" y2="22"/>
        <line x1="-13.6" y1="-8" x2="-37.4" y2="-22"/>
      </g>

      <!-- 7 outer pods (rounded diamonds) -->
      <g fill="white" opacity="0.9">
        <rect x="-7" y="-56" width="14" height="18" rx="5" transform="rotate(0)"/>
        <rect x="-7" y="-56" width="14" height="18" rx="5" transform="rotate(60)"/>
        <rect x="-7" y="-56" width="14" height="18" rx="5" transform="rotate(120)"/>
        <rect x="-7" y="-56" width="14" height="18" rx="5" transform="rotate(180)"/>
        <rect x="-7" y="-56" width="14" height="18" rx="5" transform="rotate(240)"/>
        <rect x="-7" y="-56" width="14" height="18" rx="5" transform="rotate(300)"/>
      </g>

      <!-- Outer ring (subtle) -->
      <circle cx="0" cy="0" r="55" fill="none" stroke="white" stroke-width="1.5" opacity="0.25" stroke-dasharray="4 8"/>
    </g>

    <!-- Lock icon overlay (bottom of shield) -->
    <g transform="translate(0, 56)" opacity="0.9">
      <rect x="-10" y="-6" width="20" height="15" rx="3" fill="#0a1628" stroke="#4a9af5" stroke-width="1.2"/>
      <path d="M -6 -6 L -6 -12 Q -6 -18 0 -18 Q 6 -18 6 -12 L 6 -6" fill="none" stroke="#4a9af5" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="1" r="2.5" fill="#4a9af5"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- TEXT CONTENT (right of icon)                 -->
  <!-- ============================================ -->

  <!-- Main title -->
  <text x="310" y="150" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5" filter="url(#glow)">
    KSPM Scanner
  </text>

  <!-- Subtitle -->
  <text x="310" y="188" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="400" fill="#8bacd4" letter-spacing="0.5">
    Kubernetes Security Posture Management
  </text>

  <!-- Divider line -->
  <line x1="310" y1="205" x2="750" y2="205" stroke="#326ce5" stroke-width="1.5" opacity="0.4"/>
  <line x1="310" y1="205" x2="480" y2="205" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Tagline -->
  <text x="310" y="238" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="300" fill="#a0b8d8" letter-spacing="0.3">
    Agentless security assessment with 6 compliance frameworks
  </text>

  <!-- Feature pills -->
  <!-- Pill 1: Rules -->
  <g transform="translate(310, 265)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#326ce5" opacity="0.2" stroke="#326ce5" stroke-width="0.8"/>
    <text x="50" y="20" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#89b4fa" text-anchor="middle">140+ Rules</text>
  </g>
  <!-- Pill 2: Checks -->
  <g transform="translate(422, 265)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#326ce5" opacity="0.2" stroke="#326ce5" stroke-width="0.8"/>
    <text x="60" y="20" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#89b4fa" text-anchor="middle">18 Check Groups</text>
  </g>
  <!-- Pill 3: Compliance -->
  <g transform="translate(554, 265)">
    <rect x="0" y="0" width="145" height="30" rx="15" fill="#326ce5" opacity="0.2" stroke="#326ce5" stroke-width="0.8"/>
    <text x="72" y="20" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#89b4fa" text-anchor="middle">6 Frameworks</text>
  </g>
  <!-- Pill 4: Agentless -->
  <g transform="translate(711, 265)">
    <rect x="0" y="0" width="105" height="30" rx="15" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="0.8"/>
    <text x="52" y="20" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#00d4ff" text-anchor="middle">Agentless</text>
  </g>

  <!-- Category labels row -->
  <g transform="translate(310, 315)" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5a7a9e" letter-spacing="0.5">
    <text x="0" y="0">RBAC</text>
    <text x="4" y="0" fill="#3a5070"> | </text>
    <text x="52" y="0">Workloads</text>
    <text x="56" y="0" fill="#3a5070"> | </text>
    <text x="130" y="0">Network</text>
    <text x="134" y="0" fill="#3a5070"> | </text>
    <text x="200" y="0">Images</text>
    <text x="204" y="0" fill="#3a5070"> | </text>
    <text x="260" y="0">Secrets</text>
    <text x="264" y="0" fill="#3a5070"> | </text>
    <text x="325" y="0">Nodes</text>
    <text x="329" y="0" fill="#3a5070"> | </text>
    <text x="375" y="0">Mesh</text>
    <text x="379" y="0" fill="#3a5070"> | </text>
    <text x="420" y="0">PDBs</text>
    <text x="424" y="0" fill="#3a5070"> | </text>
    <text x="465" y="0">APIs</text>
    <text x="469" y="0" fill="#3a5070"> | </text>
    <text x="505" y="0">Runtime</text>
    <text x="509" y="0" fill="#3a5070"> | </text>
    <text x="565" y="0">Supply Chain</text>
  </g>

  <!-- Severity indicator dots (bottom right area) -->
  <g transform="translate(920, 145)">
    <text x="0" y="0" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#5a7a9e" letter-spacing="1">SEVERITY LEVELS</text>
    <g transform="translate(0, 18)">
      <circle cx="6" cy="6" r="5" fill="#c0392b"/><text x="18" y="10" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e06060">CRITICAL</text>
    </g>
    <g transform="translate(0, 40)">
      <circle cx="6" cy="6" r="5" fill="#e67e22"/><text x="18" y="10" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e8a050">HIGH</text>
    </g>
    <g transform="translate(0, 62)">
      <circle cx="6" cy="6" r="5" fill="#2980b9"/><text x="18" y="10" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#5a9fd4">MEDIUM</text>
    </g>
    <g transform="translate(0, 84)">
      <circle cx="6" cy="6" r="5" fill="#27ae60"/><text x="18" y="10" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#4ac77a">LOW</text>
    </g>
  </g>

  <!-- Python badge (bottom right) -->
  <g transform="translate(920, 280)">
    <rect x="0" y="0" width="90" height="26" rx="6" fill="#306998" opacity="0.3" stroke="#4b8bbe" stroke-width="0.8"/>
    <text x="45" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#4b8bbe" text-anchor="middle">Python 3.8+</text>
  </g>

  <!-- Version badge (bottom right) -->
  <g transform="translate(1020, 280)">
    <rect x="0" y="0" width="70" height="26" rx="6" fill="#326ce5" opacity="0.2" stroke="#326ce5" stroke-width="0.8"/>
    <text x="35" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#89b4fa" text-anchor="middle">v1.5.0</text>
  </g>

  <!-- Top-right corner accent -->
  <g opacity="0.08">
    <path d="M 1200 0 L 1100 0 L 1200 100 Z" fill="#326ce5"/>
  </g>

  <!-- Bottom-left corner accent -->
  <g opacity="0.06">
    <path d="M 0 400 L 100 400 L 0 300 Z" fill="#00d4ff"/>
  </g>

  <!-- Subtle top border glow -->
  <rect x="0" y="0" width="1200" height="3" fill="#326ce5" opacity="0.6"/>
  <rect x="0" y="0" width="400" height="3" fill="#00d4ff" opacity="0.4"/>

  <!-- Subtle bottom border -->
  <rect x="0" y="397" width="1200" height="3" fill="#326ce5" opacity="0.3"/>
</svg>
